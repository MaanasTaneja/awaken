services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: awaken
      POSTGRES_PASSWORD: awaken
      POSTGRES_DB: awaken
    ports:
      - "5432:5432"
    volumes:
      - awaken_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awaken"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./awaken
      dockerfile: api/Dockerfile
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://awaken:awaken@db:5432/awaken
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./awaken/api:/app
      - ./awaken/worlds:/worlds:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Browsers reach the API at localhost:8000 (the host-exposed port)
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./src:/app/src

volumes:
  awaken_pgdata:
