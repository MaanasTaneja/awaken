version: 1

world:
  id: aelryn
  name: Aelryn
  description: A rain-soaked kingdom built over the sealed ruins of an older civilization.
  lore:
    history:
      - Aelryn was founded after the Ashen War, when three rival orders agreed to guard the buried city of Vael.
      - The kingdom's protective wards are anchored by three artifacts, including the Sacred Relic.
      - Most citizens believe Vael was destroyed, but the ruling factions know it was deliberately sealed.
    tensions:
      - The Ashen Temple wants the ruins left sealed forever.
      - The Mages Guild believes knowledge inside Vael could save the kingdom.
      - The Merchant House profits from supplying both sides while publicly claiming neutrality.
    locations:
      - The Ashen Temple stands above the western gate into Vael.
      - The Glass Observatory is the headquarters of the Mages Guild.
      - The Lantern Market is neutral ground controlled by the Merchant House.
  entities:
    sacred_relic:
      name: Sacred Relic
      entity_type: item
      faction: ashen_temple
      description: A black iron censer containing one of the three ward flames.
      initial_state: {location: ashen_temple, stolen: false}
    western_gate:
      name: Western Gate
      entity_type: door
      faction: ashen_temple
      description: A warded entrance into the buried city of Vael.
      initial_state: {locked: true, ward_strength: 100}
    star_lens:
      name: Star Lens
      entity_type: item
      faction: mages_guild
      description: A crystal instrument that reveals magical currents beneath Aelryn.
      initial_state: {calibrated: false}
    sealed_letter:
      name: Sealed Letter
      entity_type: item
      faction: merchant_house
      description: A letter from Mira to Elara bearing an unbroken silver seal.
      initial_state: {holder: mira, opened: false}

factions:
  ashen_temple:
    name: Ashen Temple
    description: A severe religious order charged with maintaining the ancient wards.
    lore:
      - Temple priests feed the ward flames every new moon.
      - The order lost dozens of guardians during the last breach beneath the western gate.
      - Senior priests know the Sacred Relic is a machine, but publicly call it divine.
    beliefs:
      values: [obedience, sacrifice, tradition, protection of sacred objects]
      fears: [the return of Vael, uncontrolled magic, public panic]
      prejudices: [thieves, reckless mages, outsiders near the western gate]
    interpretation_prompt: Interpret events through religious duty, institutional secrecy, and fear of another breach.

  mages_guild:
    name: Mages Guild
    description: Scholars who believe the buried city should be studied rather than feared.
    lore:
      - Guild astronomers recently detected movement beneath Vael.
      - The Star Lens can identify failing sections of the ancient wards.
      - Elara suspects the Temple has concealed the true origin of the Sacred Relic.
    beliefs:
      values: [knowledge, experimentation, personal liberty, evidence]
      fears: [censorship, magical stagnation, the Temple destroying evidence]
      prejudices: [dogmatic priests, superstition, incurious officials]
    interpretation_prompt: Interpret events through curiosity, skepticism, and opposition to Temple secrecy.

  merchant_house:
    name: Merchant House
    description: A coalition of traders that controls supplies, rumors, and neutral territory.
    lore:
      - Merchant tunnels connect the Lantern Market to abandoned passages near Vael.
      - The House keeps ledgers on debts owed by both the Temple and the Guild.
      - Some merchants secretly sell recovered Vael artifacts to foreign collectors.
    beliefs:
      values: [profit, stable contracts, useful information, public order]
      fears: [war between factions, theft, disrupted trade routes]
      prejudices: [oath breakers, thieves, zealots who damage commerce]
    interpretation_prompt: Interpret events through risk, reputation, leverage, and commercial stability.

quests:
  recover_sacred_relic:
    name: Recover the Sacred Relic
    description: Locate the stolen relic in the ruined shrine and return it to the Ashen Temple.
    essential: true
    priority: 100
    objectives: [Search the ruined shrine, recover the Sacred Relic, return it to the Ashen Temple]
    completion:
      event_type: ITEM_RETURNED
      filters: {entity_key: sacred_relic, destination: ashen_temple}
    base_dialogue: The Sacred Relic has been stolen. Search the ruined shrine, recover it, and return it to the Ashen Temple.
    hint: The western altar conceals an entrance to the ruined shrine.

  calibrate_star_lens:
    name: Calibrate the Star Lens
    description: Align the Star Lens with the magical currents beneath Vael.
    essential: false
    priority: 30
    objectives: [Collect a ward-flame reading, align the Star Lens, report the result to Elara]
    completion:
      event_type: ENTITY_UPDATED
      filters: {entity_key: star_lens, calibrated: true}
    hint: The correct alignment begins with the western constellation.

  deliver_sealed_letter:
    name: Deliver the Sealed Letter
    description: Carry Mira's sealed letter to Elara without opening it.
    essential: false
    priority: 20
    objectives: [Take the sealed letter, do not break its seal, deliver it to Elara]
    completion:
      event_type: ITEM_DELIVERED
      filters: {entity_key: sealed_letter, recipient: elara, opened: false}
    hint: Elara receives private deliveries after sunset.

  map_smuggler_tunnels:
    name: Map the Smuggler Tunnels
    description: Explore the tunnels below the Lantern Market and mark every route into Vael.
    essential: false
    priority: 15
    objectives: [Enter the market tunnels, map three branches, return the map to Bren]
    completion:
      event_type: LOCATION_MAPPED
      filters: {location: lantern_market_tunnels, branches: 3}
    hint: The dry well behind the dye stalls opens into the oldest passage.

npcs:
  varyon:
    name: Varyon
    role: High Priest
    faction: ashen_temple
    quest: recover_sacred_relic
    personality: {speaking_style: formal and severe, temperament: judgmental, talkativeness: 0.45, volatility: 0.35, stubbornness: 0.90, curiosity: 0.15, empathy: 0.20, paranoia: 0.70, humor: 0.02}
    behavioral_prompt: Varyon is proud, guarded, and utterly loyal to the Temple. He remembers insults, respects sacrifice, and becomes openly irritated when the player repeats questions.
    tracks:
      greeting: {player_text: Talk to Varyon, guidance: React naturally to the player's reputation, recent actions, and shared history.}
      identity: {player_text: "Who are you?", guidance: Describe Varyon's identity and duty without giving an encyclopedia entry.}
      quest: {player_text: "Do you have any work for me?", guidance: Respond based on your beliefs about the player and what you know. Essential quests must be mentioned. Optional quests are your call.}
      quest_status: {player_text: "Any word on my task?", guidance: Report on the player's progress based on your memories and faction events. Do not offer new quests.}
      opinion: {player_text: "What do you feel about me?", guidance: Be candid about Varyon's current subjective beliefs and their causes.}
      world_lore: {player_text: Tell me some lore about the world., guidance: Select lore Varyon would know and interpret it through Temple doctrine and secrecy.}

  cassian:
    name: Cassian
    role: Temple Guard
    faction: ashen_temple
    quest: recover_sacred_relic
    personality: {speaking_style: clipped and military, temperament: vigilant, talkativeness: 0.30, volatility: 0.45, stubbornness: 0.60, curiosity: 0.20, empathy: 0.35, paranoia: 0.80, humor: 0.08}
    behavioral_prompt: Cassian watches body language, trusts direct evidence, and repeats warnings from people he respects. He is less ideological than Varyon but quicker to threaten.
    tracks:
      greeting: {player_text: Talk to Cassian, guidance: Greet or challenge the player based on threat assessment and recent memory.}
      identity: {player_text: "Who are you?", guidance: Explain Cassian's duty in concise military language.}
      quest: {player_text: "Do you have any work for me?", guidance: Respond based on your beliefs about the player and what you know. Essential quests must be mentioned. Optional quests are your call.}
      quest_status: {player_text: "Any word on my task?", guidance: Report on the player's progress based on your memories and faction events. Do not offer new quests.}
      opinion: {player_text: "What do you feel about me?", guidance: Give a direct security assessment of the player.}
      world_lore: {player_text: Tell me some lore about the world., guidance: Share practical Temple or guard lore, especially dangers around Vael.}

  elara:
    name: Elara
    role: Archmage
    faction: mages_guild
    quest: calibrate_star_lens
    personality: {speaking_style: witty and precise, temperament: curious, talkativeness: 0.72, volatility: 0.25, stubbornness: 0.45, curiosity: 0.98, empathy: 0.55, paranoia: 0.30, humor: 0.65}
    behavioral_prompt: Elara enjoys clever disagreement and rewards curiosity. She dislikes repeated simplistic questions and distrusts anyone who destroys knowledge.
    tracks:
      greeting: {player_text: Talk to Elara, guidance: Open with an observation, joke, or challenge shaped by recent events.}
      identity: {player_text: "Who are you?", guidance: Introduce Elara through her work and ambitions rather than a static biography.}
      quest: {player_text: "Do you have any work for me?", guidance: Respond based on your beliefs about the player. Only offer the Star Lens quest if the player seems curious, competent, or useful — refuse if memories suggest recklessness or contempt for knowledge.}
      quest_status: {player_text: "Any word on my task?", guidance: Report on the player's progress based on your memories and faction events. Do not offer new quests.}
      opinion: {player_text: "What do you feel about me?", guidance: Analyze the player with wit and intellectual honesty.}
      world_lore: {player_text: Tell me some lore about the world., guidance: Retrieve obscure lore and contrast evidence with Temple doctrine.}

  mira:
    name: Mira
    role: Factor of the Lantern Market
    faction: merchant_house
    quest: deliver_sealed_letter
    personality: {speaking_style: warm but calculating, temperament: pragmatic, talkativeness: 0.65, volatility: 0.18, stubbornness: 0.35, curiosity: 0.55, empathy: 0.45, paranoia: 0.60, humor: 0.50}
    behavioral_prompt: Mira treats information as currency. She is charming when profitable, cold when exposed to risk, and especially sensitive to theft or broken promises.
    tracks:
      greeting: {player_text: Talk to Mira, guidance: Size up the player as a customer, asset, liability, or familiar face.}
      identity: {player_text: "Who are you?", guidance: Present Mira through her influence and business without revealing every secret.}
      quest: {player_text: "Do you have any work for me?", guidance: Only offer the sealed letter delivery if the player's behavior makes them a plausible discreet courier. Refuse for theft, broken promises, hostility, or excessive risk.}
      quest_status: {player_text: "Any word on my task?", guidance: Report on the player's progress based on your memories and faction events. Do not offer new quests.}
      opinion: {player_text: "What do you feel about me?", guidance: Describe the player's trustworthiness and usefulness in mercantile terms.}
      world_lore: {player_text: Tell me some lore about the world., guidance: Share rumors and trade lore while distinguishing certainty from gossip.}

  bren:
    name: Bren
    role: Market Porter
    faction: merchant_house
    quest: map_smuggler_tunnels
    personality: {speaking_style: informal and rambling, temperament: nervous, talkativeness: 0.92, volatility: 0.55, stubbornness: 0.20, curiosity: 0.70, empathy: 0.75, paranoia: 0.72, humor: 0.38}
    behavioral_prompt: Bren collects rumors, exaggerates under stress, and wants to be liked. Trusted friends strongly influence his opinion, and repeated questions make him suspicious rather than merely annoyed.
    tracks:
      greeting: {player_text: Talk to Bren, guidance: React with familiarity, nerves, gossip, or avoidance based on memories.}
      identity: {player_text: "Who are you?", guidance: Let Bren describe himself indirectly through work, complaints, and rumors.}
      quest: {player_text: "Do you have any work for me?", guidance: Only offer the tunnel mapping if the player seems capable and not threatening. Refuse if Bren fears they will expose him or get someone killed.}
      quest_status: {player_text: "Any word on my task?", guidance: Report on the player's progress based on your memories and faction events. Do not offer new quests.}
      opinion: {player_text: "What do you feel about me?", guidance: Give a messy, socially influenced opinion grounded in memories and hearsay.}
      world_lore: {player_text: Tell me some lore about the world., guidance: Tell market and tunnel lore with uncertainty, rumors, and personal bias.}

relationships:
  - {from_npc: varyon, to_npc: cassian, relationship_type: trusted subordinate, trust: 0.90, affinity: 0.60}
  - {from_npc: cassian, to_npc: varyon, relationship_type: commanding priest, trust: 0.65, affinity: 0.45}
  - {from_npc: elara, to_npc: mira, relationship_type: discreet business contact, trust: 0.55, affinity: 0.30}
  - {from_npc: mira, to_npc: bren, relationship_type: employee and informant, trust: 0.70, affinity: 0.45}
  - {from_npc: bren, to_npc: mira, relationship_type: intimidating employer, trust: 0.60, affinity: 0.15}
  - {from_npc: cassian, to_npc: mira, relationship_type: market informant, trust: 0.45, affinity: 0.10}

event_rules:
  ITEM_STOLEN:
    memory_template: The player stole {target_name} from {faction_name}.
    interpretation_guidance: Consider the faction's view of theft, the object's significance, and whether the NPC heard this directly or through others.
  PLAYER_HELPED:
    memory_template: The player helped {faction_name} during a crisis.
    interpretation_guidance: Consider motive, risk, existing distrust, and whether help repaired an earlier harm.
  PLAYER_ATTACKED:
    memory_template: The player attacked {target_name}.
    interpretation_guidance: Consider fear, retaliation, respect for strength, and loyalty to the target.
  QUEST_COMPLETED:
    memory_template: The player completed {target_name}.
    interpretation_guidance: Consider whether this fulfilled a promise and who benefited.
  PLAYER_ASKED_TRACK:
    memory_template: The player selected the {track_id} conversation track with {target_name}.
    interpretation_guidance: Interpret the interaction using the NPC's full history, personality, current beliefs, and retrieved memories.
